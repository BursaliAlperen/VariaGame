<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>2048 - VariaGame</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body{margin:0;min-height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(160deg,#eef3ff,#dbe7ff);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
    .wrap{width:min(94vw,480px);padding:16px;border-radius:28px;background:rgba(255,255,255,.58);backdrop-filter:blur(16px);box-shadow:0 10px 30px rgba(0,0,0,.12)}
    .head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .score{padding:8px 12px;border-radius:12px;background:#fff;font-weight:700}
    .grid{position:relative;background:#b8c6ef;border-radius:16px;padding:10px;touch-action:none}
    .cells{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    .cell{aspect-ratio:1;border-radius:12px;background:rgba(255,255,255,.28)}
    .tile{position:absolute;border-radius:12px;display:flex;align-items:center;justify-content:center;font-weight:800;color:#25324a;transition:all .15s ease;box-shadow:0 5px 12px rgba(0,0,0,.08)}
    .n2{background:#eef5ff}.n4{background:#dfeaff}.n8{background:#cce0ff}.n16{background:#bdd6ff}.n32{background:#abc9ff}.n64{background:#95b8ff}
    .n128,.n256,.n512,.n1024,.n2048{background:#6f98ff;color:#fff}
    .actions{display:flex;gap:8px;margin-top:12px}
    button{flex:1;border:none;border-radius:12px;padding:10px 12px;cursor:pointer;font-weight:700}
    .primary{background:#5b7cfa;color:#fff}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <h2>2048</h2>
      <div class="score">Score: <span id="score">0</span></div>
      <div class="score">Best: <span id="best">0</span></div>
    </div>
    <div class="grid" id="grid">
      <div class="cells">
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
      </div>
    </div>
    <div class="actions"><button id="newGame">New</button><button class="primary" id="backHub">Hub</button></div>
  </div>
  <script>
    const tg = window.Telegram?.WebApp;
    tg?.ready();
    tg?.BackButton?.show();

    const N=4;
    let board, score;
    const grid = document.getElementById('grid');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    let best = Number(localStorage.getItem('vg_2048_best')||0);
    bestEl.textContent = best;
    const startAt = Date.now();

    function sendSession(minutes){
      try {
        const initData = tg?.initData || '';
        if (!initData || minutes < 1) return;
        const payload = JSON.stringify({ initData, gameId:'2048', minutes, isAfk:false, isActive:true });
        navigator.sendBeacon('/api/play-session', new Blob([payload], { type:'application/json' }));
      } catch (_) {}
    }

    function closeToHub(){
      const mins = Math.floor((Date.now() - startAt)/60000);
      sendSession(mins);
      window.location.href='/';
    }
    tg?.BackButton?.onClick(closeToHub);

    function reset(){ board=Array.from({length:N},()=>Array(N).fill(0)); score=0; addRandom(); addRandom(); render(); }
    function emptyCells(){ const arr=[]; for(let r=0;r<N;r++) for(let c=0;c<N;c++) if(!board[r][c]) arr.push([r,c]); return arr; }
    function addRandom(){ const e=emptyCells(); if(!e.length) return; const [r,c]=e[Math.floor(Math.random()*e.length)]; board[r][c]=Math.random()<0.9?2:4; }
    function rotate(b){ const out=Array.from({length:N},()=>Array(N).fill(0)); for(let r=0;r<N;r++) for(let c=0;c<N;c++) out[c][N-1-r]=b[r][c]; return out; }
    function slideLeft(b){
      let moved=false, gained=0;
      const out=b.map(row=>{
        const vals=row.filter(Boolean); const merged=[];
        for(let i=0;i<vals.length;i++){
          if(vals[i] && vals[i]===vals[i+1]){ merged.push(vals[i]*2); gained += vals[i]*2; i++; moved=true; }
          else merged.push(vals[i]);
        }
        while(merged.length<N) merged.push(0);
        if(merged.join(',')!==row.join(',')) moved=true;
        return merged;
      });
      return { out, moved, gained };
    }
    function move(dir){
      let b=board.map(r=>[...r]);
      if(dir===1){ b=rotate(b); }
      if(dir===2){ b=rotate(rotate(b)); }
      if(dir===3){ b=rotate(rotate(rotate(b))); }
      const { out, moved, gained } = slideLeft(b);
      if(!moved) return;
      b=out;
      if(dir===1){ b=rotate(rotate(rotate(b))); }
      if(dir===2){ b=rotate(rotate(b)); }
      if(dir===3){ b=rotate(b); }
      board=b; score+=gained; if(score>best){ best=score; localStorage.setItem('vg_2048_best',best); }
      addRandom(); render(); if(isGameOver()) alert('Game Over');
    }
    function isGameOver(){ if(emptyCells().length) return false; for(let r=0;r<N;r++) for(let c=0;c<N;c++){ const v=board[r][c]; if((board[r+1]?.[c]===v)||(board[r]?.[c+1]===v)) return false; } return true; }
    function render(){
      scoreEl.textContent=score; bestEl.textContent=best;
      document.querySelectorAll('.tile').forEach(n=>n.remove());
      const cs = grid.querySelectorAll('.cell');
      const rect = cs[0].getBoundingClientRect();
      const gap = (cs[1].getBoundingClientRect().left - rect.left - rect.width) || 10;
      for(let r=0;r<N;r++) for(let c=0;c<N;c++){
        const v=board[r][c]; if(!v) continue;
        const d=document.createElement('div'); d.className=`tile n${v}`; d.textContent=v;
        d.style.width = rect.width+'px'; d.style.height=rect.height+'px';
        d.style.left = (10 + c*(rect.width+gap))+'px'; d.style.top=(10 + r*(rect.height+gap))+'px';
        grid.appendChild(d);
      }
    }

    window.addEventListener('keydown',(e)=>{ if(e.key==='ArrowLeft')move(0); if(e.key==='ArrowUp')move(1); if(e.key==='ArrowRight')move(2); if(e.key==='ArrowDown')move(3); });
    let sx=0,sy=0;
    grid.addEventListener('touchstart',(e)=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
    grid.addEventListener('touchend',(e)=>{
      const dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
      if(Math.abs(dx)<20 && Math.abs(dy)<20) return;
      if(Math.abs(dx)>Math.abs(dy)) move(dx>0?2:0); else move(dy>0?3:1);
    },{passive:true});

    window.addEventListener('beforeunload', ()=>{
      const mins = Math.floor((Date.now() - startAt)/60000);
      sendSession(mins);
    });

    document.getElementById('newGame').onclick=reset;
    document.getElementById('backHub').onclick=closeToHub;
    reset();
  </script>
</body>
</html>
